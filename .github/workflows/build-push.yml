name: Build and Push to ECR

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'services/**'
      - '.github/workflows/build-push.yml'

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [notification-service, order-service, product-service, user-service]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Environment Suffix
        id: set-env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env_suffix=prod" >> $GITHUB_OUTPUT
          else
            echo "env_suffix=staging" >> $GITHUB_OUTPUT
          fi

      - name: Build, Tag, and Push Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SERVICE_NAME: ${{ matrix.service }}
          ENV_SUFFIX: ${{ steps.set-env.outputs.env_suffix }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          REPO_NAME="cloudmart-${SERVICE_NAME}-${ENV_SUFFIX}"
          IMAGE_URI="${REGISTRY}/${REPO_NAME}"
          
          echo "Building Docker image for ${SERVICE_NAME}..."
          docker build -t ${REPO_NAME} services/${SERVICE_NAME}
          
          echo "Tagging image..."
          docker tag ${REPO_NAME}:latest ${IMAGE_URI}:latest
          docker tag ${REPO_NAME}:latest ${IMAGE_URI}:${COMMIT_SHA}
          
          echo "Pushing images to ECR..."
          docker push ${IMAGE_URI}:latest
          docker push ${IMAGE_URI}:${COMMIT_SHA}
