name: PR Checks

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  validate-manifests:
    name: Validate Helm Templates (kubeconform)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout Helm Charts
        uses: actions/checkout@v4
        with:
          repository: CIM-CloudMart/helm-charts
          path:       helm-charts
          token:      ${{ secrets.HELM_CHARTS_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Install kubeconform
        run: |
          curl -sL \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
          | tar xz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform --version

      - name: Validate Production Helm templates
        run: |
          helm template cloudmart ./helm-charts/charts/cloudmart \
            -f ./helm-charts/charts/cloudmart/values.yaml \
            -f ./helm-charts/charts/cloudmart/values-prod.yaml \
          | kubeconform -strict -summary -ignore-missing-schemas -kubernetes-version 1.29.0

      - name: Validate Staging Helm templates
        run: |
          helm template cloudmart ./helm-charts/charts/cloudmart \
            -f ./helm-charts/charts/cloudmart/values.yaml \
            -f ./helm-charts/charts/cloudmart/values-staging.yaml \
          | kubeconform -strict -summary -ignore-missing-schemas -kubernetes-version 1.29.0

  build-and-scan:
    name: Build & Scan – ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, product-service, order-service, user-service, notification-service]
      fail-fast: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Local Docker Build
        run: |
          docker build \
            -t "cloudmart/${{ matrix.service }}:test" \
            "services/${{ matrix.service }}"

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "cloudmart/${{ matrix.service }}:test"
          format: table
          severity: CRITICAL
          exit-code: "1"
