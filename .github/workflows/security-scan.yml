name: Security & Vulnerability Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  id-token: write
  contents: read
  security-events: write   # needed to upload SARIF to GitHub Security tab

jobs:
  trivy-scan:
    name: Trivy Repository Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # only needed for orgs, free for public repos

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit --quiet

      - name: Audit frontend (npm)
        working-directory: frontend
        run: npm audit --audit-level=critical
        continue-on-error: false

      - name: Audit user-service (npm or pip)
        working-directory: user-service
        run: |
          if [ -f package.json ]; then npm audit --audit-level=critical; fi
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; fi

      - name: Audit product-service
        working-directory: product-service
        run: |
          if [ -f package.json ]; then npm audit --audit-level=critical; fi
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; fi

      - name: Audit order-service
        working-directory: order-service
        run: |
          if [ -f package.json ]; then npm audit --audit-level=critical; fi
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; fi

      - name: Audit notification-service
        working-directory: notification-service
        run: |
          if [ -f package.json ]; then npm audit --audit-level=critical; fi
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; fi

  scan-summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan, secret-scan, dependency-audit]
    if: always()
    steps:
      - name: Check all scan results
        run: |
          echo "Trivy: ${{ needs.trivy-scan.result }}"
          echo "Secrets: ${{ needs.secret-scan.result }}"
          echo "Deps: ${{ needs.dependency-audit.result }}"
          if [[ "${{ needs.trivy-scan.result }}" == "failure" || \
                "${{ needs.secret-scan.result }}" == "failure" || \
                "${{ needs.dependency-audit.result }}" == "failure" ]]; then
            echo "One or more security scans failed. Blocking."
            exit 1
          fi
          echo "All scans passed."