name: Security & Vulnerability Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: Trivy Repository Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json

  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (free, no license needed)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit --quiet

      # Node.js services
      - name: Audit frontend
        working-directory: services/frontend
        run: npm audit --audit-level=critical

      - name: Audit order-service
        working-directory: services/order-service
        run: npm audit --audit-level=critical

      - name: Audit notification-service
        working-directory: services/notification-service
        run: npm audit --audit-level=critical

      # Python services
      - name: Audit product-service
        working-directory: services/product-service
        run: pip-audit -r requirements.txt

      - name: Audit user-service
        working-directory: services/user-service
        run: pip-audit -r requirements.txt

  scan-summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan, secret-scan, dependency-audit]
    if: always()
    steps:
      - name: Check all scan results
        run: |
          echo "Trivy:   ${{ needs.trivy-scan.result }}"
          echo "Secrets: ${{ needs.secret-scan.result }}"
          echo "Deps:    ${{ needs.dependency-audit.result }}"
          if [[ "${{ needs.trivy-scan.result }}" == "failure" || \
                "${{ needs.secret-scan.result }}" == "failure" || \
                "${{ needs.dependency-audit.result }}" == "failure" ]]; then
            echo "One or more security scans failed."
            exit 1
          fi
          echo "All scans passed."