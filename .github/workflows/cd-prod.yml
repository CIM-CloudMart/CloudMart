name: CD Production

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'helm-charts/**'
      - '.github/workflows/cd-prod.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [notification-service, order-service, product-service, user-service, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SERVICE_NAME: ${{ matrix.service }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          REPO_NAME="cloudmart-${SERVICE_NAME}-prod"
          IMAGE_URI="${REGISTRY}/${REPO_NAME}"
          
          echo "Building Docker image for ${SERVICE_NAME}..."
          docker build -t ${REPO_NAME} services/${SERVICE_NAME}
          
          echo "Tagging image..."
          docker tag ${REPO_NAME}:latest ${IMAGE_URI}:latest
          docker tag ${REPO_NAME}:latest ${IMAGE_URI}:${COMMIT_SHA}
          
          echo "Pushing images to ECR..."
          docker push ${IMAGE_URI}:latest
          docker push ${IMAGE_URI}:${COMMIT_SHA}

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name cloudmart-eks-prod --region ap-south-1

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Deploy Helm Chart
        run: |
          helm upgrade --install cloudmart ./helm-charts \
            --namespace cloudmart-prod \
            --create-namespace \
            -f ./helm-charts/values-prod.yaml \
            --set global.registry=779417963796.dkr.ecr.ap-south-1.amazonaws.com \
            --set notification.image.tag=${{ github.sha }} \
            --set order.image.tag=${{ github.sha }} \
            --set product.image.tag=${{ github.sha }} \
            --set user.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }}
