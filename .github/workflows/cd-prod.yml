name: CD Production

on:
  workflow_run:
    workflows: ["Build and Push to ECR"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name cloudmart-eks-prod --region ap-south-1

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Deploy Helm Chart
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          if [ -z "$COMMIT_SHA" ]; then
            COMMIT_SHA="${{ github.sha }}"
          fi
          
          helm upgrade --install cloudmart ./helm-charts \
            --namespace cloudmart-prod \
            --create-namespace \
            -f ./helm-charts/values-prod.yaml \
            --set global.registry=779417963796.dkr.ecr.ap-south-1.amazonaws.com \
            --set notification.image.tag=${COMMIT_SHA} \
            --set order.image.tag=${COMMIT_SHA} \
            --set product.image.tag=${COMMIT_SHA} \
            --set user.image.tag=${COMMIT_SHA} \
            --set frontend.image.tag=${COMMIT_SHA}
