name: Manual Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Microservice to deploy'
        required: true
        type: choice
        options:
          - frontend
          - user-service
          - product-service
          - order-service
          - notification-service
      branch:
        description: 'Branch to build and deploy'
        required: true
        default: 'main'
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  deploy:
    name: Build, Tag & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Security Check
        run: |
          if [ "${{ inputs.environment }}" = "production" ] && [ "${{ inputs.branch }}" != "main" ]; then
            echo "::error::Security violation: Only the main branch can be deployed to production!"
            exit 1
          fi

      - name: Checkout CloudMart Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Verify Checked-out Branch
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "Checked out branch is $CURRENT_BRANCH"
          if [ "${{ inputs.environment }}" = "production" ] && [ "$CURRENT_BRANCH" != "main" ]; then
            echo "::error::Security violation: Deployed branch must be main for production environment!"
            exit 1
          fi

      - name: Checkout Helm Charts
        uses: actions/checkout@v4
        with:
          repository: CIM-CloudMart/helm-charts
          path: helm-charts
          token: ${{ secrets.HELM_CHARTS_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Log in to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Environment variables
        id: envs
        run: |
          ENV="${{ inputs.environment }}"
          SERVICE="${{ inputs.service }}"
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          
          # Map service names to Helm subchart keys
          case "$SERVICE" in
            user-service) HELM_KEY="user" ;;
            product-service) HELM_KEY="product" ;;
            order-service) HELM_KEY="order" ;;
            notification-service) HELM_KEY="notification" ;;
            frontend) HELM_KEY="frontend" ;;
          esac
          
          if [ "$ENV" = "production" ]; then
            ENV_SHORT="prod"
          else
            ENV_SHORT="staging"
          fi
          
          # ECR Repository name pattern matching Terraform modules/ecr/main.tf
          ECR_REPOSITORY="cloudmart-${SERVICE}-${ENV_SHORT}"
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="${SHORT_SHA}-${{ github.run_number }}"
          
          echo "cluster_name=cloudmart-eks-${ENV_SHORT}" >> $GITHUB_OUTPUT
          echo "namespace=cloudmart-${ENV_SHORT}" >> $GITHUB_OUTPUT
          echo "file_env=${ENV_SHORT}" >> $GITHUB_OUTPUT
          echo "helm_key=$HELM_KEY" >> $GITHUB_OUTPUT
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ inputs.service }}
          push: true
          tags: ${{ steps.envs.outputs.image_uri }}:${{ steps.envs.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Helm Chart Values (GitOps Sync)
        run: |
          HELM_KEY="${{ steps.envs.outputs.helm_key }}"
          ENV_FILE="helm-charts/values-${{ steps.envs.outputs.file_env }}.yaml"
          
          echo "Updating $ENV_FILE for service ${{ inputs.service }} with repository ${{ steps.envs.outputs.image_uri }} and tag ${{ steps.envs.outputs.image_tag }}..."
          
          # Update the service image repository and tag
          yq -i ".${HELM_KEY}.image.repository = \"${{ steps.envs.outputs.image_uri }}\"" $ENV_FILE
          yq -i ".${HELM_KEY}.image.tag = \"${{ steps.envs.outputs.image_tag }}\"" $ENV_FILE
          
          # Ensure global.registry is cleared in env override so it doesn't prepend the values.yaml one
          yq -i '.global.registry = ""' $ENV_FILE
          
          # Push to the helm-charts repository
          cd helm-charts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add values-${{ steps.envs.outputs.file_env }}.yaml
          git commit -m "chore(gitops): deploy ${{ inputs.service }} with tag ${{ steps.envs.outputs.image_tag }} to ${{ inputs.environment }}"
          git push

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ steps.envs.outputs.cluster_name }} --region ap-south-1

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Deploy Helm Chart to EKS
        run: |
          helm upgrade --install cloudmart ./helm-charts \
            --namespace ${{ steps.envs.outputs.namespace }} \
            --create-namespace \
            -f ./helm-charts/values.yaml \
            -f ./helm-charts/values-${{ steps.envs.outputs.file_env }}.yaml

      - name: Verify Rollout
        run: |
          echo "Verifying rollout status for deployment/${{ inputs.service }} in namespace ${{ steps.envs.outputs.namespace }}..."
          kubectl rollout status deployment/${{ inputs.service }} -n ${{ steps.envs.outputs.namespace }} --timeout=300s
