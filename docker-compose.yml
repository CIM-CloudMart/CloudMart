# CloudMart — Local Development Environment
#
# AWS Service Mapping (production → local):
#   DynamoDB  (cloudmart-products-prod)          → LocalStack :4566
#   DynamoDB  (cloudmart-processed-events-prod)  → LocalStack :4566
#   SQS       (cloudmart-order-events-prod)       → LocalStack :4566
#   SQS DLQ   (cloudmart-order-events-dlq-prod)  → LocalStack :4566
#   RDS PostgreSQL                               → postgres   :5432
#   AWS SES                                      → console log (EMAIL_BACKEND=console)
#   AWS X-Ray                                    → xray-daemon :2000
#
# Run:    docker compose up --build
# Access: http://localhost:3000
#
# Ports exposed to host:
#   3000  → Frontend (React/Nginx)
#   8001  → product-service
#   8002  → order-service
#   8003  → user-service
#   8004  → notification-service
#   4566  → LocalStack (DynamoDB + SQS)
#   5432  → PostgreSQL
#   2000  → AWS X-Ray daemon (UDP)

services:
  # INFRASTRUCTURE — AWS service emulators
  # ---- LocalStack: emulates DynamoDB + SQS (mirrors AWS) ----
  localstack:
    image: localstack/localstack:3.4
    container_name: cloudmart-localstack
    ports:
      - "4566:4566" # Unified LocalStack gateway
    environment:
      - SERVICES=dynamodb,sqs,xray
      - DEFAULT_REGION=ap-south-1
      - AWS_DEFAULT_REGION=ap-south-1
      - EAGER_SERVICE_LOADING=1
      - LOCALSTACK_HOST=localstack
      - DEBUG=0
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4566/_localstack/health" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 10
    networks:
      - cloudmart

  # ---- LocalStack bootstrap: provisions all tables and queues ----
  #   - aws_dynamodb_table.products            → cloudmart-products-prod
  #   - aws_dynamodb_table.processed_events    → cloudmart-processed-events-prod
  #   - aws_sqs_queue.order_events_dlq         → cloudmart-order-events-dlq-prod
  #   - aws_sqs_queue.order_events             → cloudmart-order-events-prod
  localstack-init:
    image: amazon/aws-cli:2.15.30
    container_name: cloudmart-localstack-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-south-1
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        set -e
        ENDPOINT="http://localstack:4566"

        echo "==> [DynamoDB] Creating table: cloudmart-products-prod"
        aws dynamodb create-table \
          --endpoint-url $$ENDPOINT \
          --table-name cloudmart-products-prod \
          --attribute-definitions AttributeName=id,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --region ap-south-1 2>/dev/null || echo "    (already exists — skipping)"

        echo "==> [DynamoDB] Creating table: cloudmart-processed-events-prod"
        aws dynamodb create-table \
          --endpoint-url $$ENDPOINT \
          --table-name cloudmart-processed-events-prod \
          --attribute-definitions AttributeName=id,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --region ap-south-1 2>/dev/null || echo "    (already exists — skipping)"

        echo "==> [SQS] Creating DLQ: cloudmart-order-events-dlq-prod"
        aws sqs create-queue \
          --endpoint-url $$ENDPOINT \
          --queue-name cloudmart-order-events-dlq-prod \
          --region ap-south-1 2>/dev/null || echo "    (already exists — skipping)"

        echo "==> [SQS] Fetching DLQ ARN..."
        DLQ_ARN=$$(aws sqs get-queue-attributes \
          --endpoint-url $$ENDPOINT \
          --queue-url $$ENDPOINT/000000000000/cloudmart-order-events-dlq-prod \
          --attribute-names QueueArn \
          --query 'Attributes.QueueArn' \
          --output text \
          --region ap-south-1)
        echo "    DLQ ARN: $$DLQ_ARN"

        echo "==> [SQS] Creating queue: cloudmart-order-events-prod (with DLQ redrive)"
        aws sqs create-queue \
          --endpoint-url $$ENDPOINT \
          --queue-name cloudmart-order-events-prod \
          --attributes '{"VisibilityTimeout":"30","MessageRetentionPeriod":"1209600","RedrivePolicy":"{\"deadLetterTargetArn\":\"'$$DLQ_ARN'\",\"maxReceiveCount\":\"5\"}"}' \
          --region ap-south-1 2>/dev/null || echo "    (already exists — skipping)"

        echo ""
        echo "==> All LocalStack resources provisioned:"
        echo "    DynamoDB tables:"
        aws dynamodb list-tables --endpoint-url $$ENDPOINT --region ap-south-1 --output text
        echo "    SQS queues:"
        aws sqs list-queues --endpoint-url $$ENDPOINT --region ap-south-1 --output text
        echo "==> Bootstrap complete!"
    networks:
      - cloudmart
    restart: on-failure

  # ---- PostgreSQL: mirrors AWS RDS (production DB for user-service) ----
  postgres:
    image: postgres:16-alpine
    container_name: cloudmart-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cloudmart
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d cloudmart" ]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - cloudmart

  # ---- AWS X-Ray Daemon: mirrors AWS X-Ray distributed tracing ----
  # product-service and order-service both instrument with AWS X-Ray SDK
  xray-daemon:
    image: amazon/aws-xray-daemon:3.3.13
    container_name: cloudmart-xray-daemon
    ports:
      - "2000:2000/udp" # Trace segment receiver
    command: [ "--local-mode", "--log-level", "dev" ]
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-south-1
      - AWS_XRAY_ENDPOINT=http://localstack:4566
    networks:
      - cloudmart

  # ==============================================================
  # APPLICATION SERVICES
  # ==============================================================

  # ---- Product Service (Python/Flask) ----
  # Production:  STORE_BACKEND=dynamodb → AWS DynamoDB
  # Local:       STORE_BACKEND=dynamodb → LocalStack DynamoDB at :4566
  product-service:
    build: ./services/product-service
    container_name: cloudmart-product
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - FLASK_DEBUG=true
      # Store backend — mirrors production DynamoDB table
      - STORE_BACKEND=dynamodb
      - DYNAMODB_TABLE=cloudmart-products-prod
      - DYNAMODB_ENDPOINT=http://localstack:4566
      # AWS credentials — LocalStack accepts any non-empty value
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-south-1
      # X-Ray tracing — mirrors production AWS X-Ray
      - AWS_XRAY_DAEMON_ADDRESS=xray-daemon:2000
      - AWS_XRAY_SDK_ENABLED=true
      - AWS_XRAY_TRACING_NAME=product-service
      - AWS_ENDPOINT_URL=http://localstack:4566
    depends_on:
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
      xray-daemon:
        condition: service_started
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - cloudmart

  # ---- Order Service (Node.js/Express) ----
  # Production:  QUEUE_BACKEND=sqs → AWS SQS
  # Local:       QUEUE_BACKEND=sqs → LocalStack SQS at :4566
  order-service:
    build: ./services/order-service
    container_name: cloudmart-order
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - ENVIRONMENT=local
      # Service mesh — mirrors production Kubernetes DNS
      - PRODUCT_SERVICE_URL=http://product-service:8001
      # Queue backend — mirrors production SQS queue
      - QUEUE_BACKEND=sqs
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/cloudmart-order-events-prod
      - AWS_REGION=ap-south-1
      # AWS credentials — LocalStack accepts any non-empty value
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      # X-Ray tracing — mirrors production AWS X-Ray
      - AWS_XRAY_DAEMON_ADDRESS=xray-daemon:2000
      - AWS_ENDPOINT_URL=http://localstack:4566
    depends_on:
      product-service:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
      xray-daemon:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:8002/health" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - cloudmart

  # ---- User Service (Python/Flask) ----
  # Production:  DB_BACKEND=postgres → AWS RDS PostgreSQL
  # Local:       DB_BACKEND=postgres → local PostgreSQL container
  user-service:
    build: ./services/user-service
    container_name: cloudmart-user
    command: [ "gunicorn", "--bind", "0.0.0.0:8003", "--workers", "1", "--access-logfile", "-", "app:app" ]
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - FLASK_DEBUG=true
      # DB backend — mirrors production RDS PostgreSQL
      - DB_BACKEND=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cloudmart
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      # JWT — production reads this from AWS Secrets Manager
      - JWT_SECRET=cloudmart-dev-secret-change-in-production
      - JWT_EXPIRY_HOURS=24
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - cloudmart

  # ---- Notification Service (Node.js) ----
  # Production:  QUEUE_BACKEND=sqs     → AWS SQS (receive order events)
  #              EMAIL_BACKEND=ses      → AWS SES
  #              EVENTS_TABLE           → AWS DynamoDB (deduplication)
  # Local:       QUEUE_BACKEND=sqs     → LocalStack SQS at :4566
  #              EMAIL_BACKEND=console  → stdout log
  #              EVENTS_TABLE           → LocalStack DynamoDB at :4566
  notification-service:
    build: ./services/notification-service
    container_name: cloudmart-notification
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - POLL_INTERVAL_MS=5000
      # Service URLs — mirrors production Kubernetes DNS
      - ORDER_SERVICE_URL=http://order-service:8002
      - USER_SERVICE_URL=http://user-service:8003
      # Queue backend — mirrors production SQS
      - QUEUE_BACKEND=sqs
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/cloudmart-order-events-prod
      # Event deduplication — mirrors production DynamoDB table
      - EVENTS_TABLE=cloudmart-processed-events-prod
      # Email backend — console for local dev; set to 'ses' in production
      - EMAIL_BACKEND=console
      - FROM_EMAIL=no-reply@cloudmart.com
      - AWS_REGION=ap-south-1
      # AWS credentials — LocalStack accepts any non-empty value
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      # Override all AWS SDK endpoints → routes DynamoDB + SQS calls to LocalStack
      - AWS_ENDPOINT_URL=http://localstack:4566
    depends_on:
      order-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:8004/health" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - cloudmart

  # ---- Frontend (React + Nginx) ----
  frontend:
    build: ./services/frontend
    container_name: cloudmart-frontend
    ports:
      - "3000:80"
    depends_on:
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:80/health" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - cloudmart

networks:
  cloudmart:
    driver: bridge

volumes:
  localstack-data:
    driver: local
  postgres-data:
    driver: local
