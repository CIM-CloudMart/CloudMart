apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: production
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-service
    spec:
      # TODO: Add serviceAccountName for workload identity
      serviceAccountName: order-service-sa
      containers:
        - name: order-service
          image: <YOUR-REGISTRY>/order-service:latest
          ports:
            - containerPort: 8002
          env:
            - name: PORT
              value: "8002"
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: cloudmart-config
                  key: PRODUCT_SERVICE_URL
            - name: QUEUE_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: cloudmart-config
                  key: ORDER_QUEUE_BACKEND
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 30
